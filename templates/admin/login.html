<!doctype html>
<html><head><meta charset="utf-8"><title>Sign in · Admin</title>
<style>
:root{--bg:#fff;--bg-card:#fff;--fg:#222;--fg-soft:#444;--line:#e2e2e2;--accent:#0066cc;--bad:#c0392b}
*{box-sizing:border-box}
body{font:14px -apple-system,system-ui,Segoe UI,Roboto,sans-serif;margin:0;color:var(--fg);
  background:#f7f7f8;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg-card);border:1px solid var(--line);border-radius:10px;
  padding:28px 30px;width:340px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
.login-box h1{margin:0 0 18px 0;font-size:17px;text-align:center}
.login-box label{display:block;font-size:13px;margin-bottom:4px;color:var(--fg-soft)}
.login-box input{width:100%;padding:8px 10px;margin-bottom:14px;
  border:1px solid var(--line);border-radius:4px;font:inherit;font-size:14px}
.login-box button{width:100%;padding:9px;font-size:14px;border:1px solid var(--accent);
  border-radius:4px;background:var(--accent);color:#fff;cursor:pointer}
.login-box button:hover{filter:brightness(1.08)}
.login-box .err{color:var(--bad);font-size:13px;margin-bottom:12px;text-align:center}
.login-box .warn{font-size:12px;color:#b86b00;margin-top:14px;text-align:center}
</style></head>
<body>
<div class="login-box">
  <h1>Server Admin</h1>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post" action="{{ url_for('login', next=request.args.get('next')) }}">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" autofocus required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
  </form>
  <div class="warn">Stops, starts, updates, and rolls back the production review apps.</div>
</div>
</body></html>
